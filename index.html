<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a0533, #2d1060);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.5em;
      color: #ffe066;
    }

    .name {
      font-size: 2em;
      color: #6bffcc;
      margin-bottom: 20px;
    }

    .message {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      line-height: 1.6;
    }

    .photos-section {
      margin: 40px auto;
      max-width: 700px;
    }

    .photo-gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 0 20px;
    }

    .photo-gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
    }

    .cake {
      font-size: 80px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>🎉 Happy Birthday 🎉</h1>
  <div class="name">Diya 💖</div>

  <div class="message">
    My dearest Diya 💕 <br><br>
    You are the most magical and beautiful girl! 🦄✨<br>
    May your life be full of happiness, love and dreams 🌈
  </div>

  <!-- PHOTOS -->
  <div class="photos-section">
    <h2>📸 Beautiful Memories</h2>

    <div class="photo-gallery">
      <img src="photo1.JPG">
      <img src="photo1.JPG">
      <img src="photo1.JPG">
      <img src="photo1.JPG">
    </div>
  </div>

  <!-- CAKE -->
  <div class="cake">🎂</div>

</body>
</html>
